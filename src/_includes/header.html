{% set navPages = collections.all | eleventyNavigation %}
<header class="Header">
  <nav class="Nav" aria-label="Primary">
    <a class="Nav-stamp" href="/" aria-label="{{ client.title }} home">JC BTC</a>
    <div class="Nav-links">
      {%- for entry in navPages %}
      <a {% if entry.url==page.url %} class="active-menu" {% endif %} href='{{ entry.url }}'>{{
        entry.title }}</a>
      {# Add static link after the third item (index 1) #}
      {% if loop.index == navPages.length - 1 %}
      <a href="{{client.meetup}}" target="_blank" rel="noopener">Meetup</a>
      {% endif %}
      {% endfor %}
    </div>
  </nav>
</header>
