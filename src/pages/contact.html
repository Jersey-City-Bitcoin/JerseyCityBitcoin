<div class="Page Page--reading">
  <header class="Page-header">
    <h1 class="Page-title">Contact Us</h1>
    <p class="Page-intro">Have a question about the community or an upcoming meetup? Send us a note.</p>
  </header>

  <form class="Contact-form" name="contact" method="POST" data-netlify-recaptcha="true" netlify-honeypot="bot-field" data-netlify="true" action="/success/">
    <input type='hidden' name="bot-field" />
    <input type='hidden' id='userIp' name='userIp' />
    <p class="Contact-field">
      <label>Name <input type="text" name="name" autocomplete="name" /></label>
    </p>
    <p class="Contact-field">
      <label>Email <input type="email" name="email" autocomplete="email" /></label>
    </p>
    <p class="Contact-field">
      <label>Twitter / Nostr <input type="text" name="social" /></label>
    </p>
    <p class="Contact-field">
      <label>Message <textarea name="message"></textarea></label>
    </p>
    <div class="Contact-captcha"><div data-netlify-recaptcha="true"></div></div>
    <div class="Contact-actions">
      <button class="Contact-submit" type="submit">Send</button>
    </div>
  </form>
</div>
<script>
  // Fetch the user's IP address from ipify
  fetch('https://api.ipify.org?format=json')
    .then(response => response.json())
    .then(data => {
      // Update the value of the hidden input with the user's IP address
      document.getElementById('userIp').value = data.ip;
    })
    .catch(error => {
      console.error('Error fetching IP address:', error);
    });
</script>
